<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação Comercial | [MILENA GREFF LIMA]</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;

            max-width: 400px;
            width: 90%;
        }
        .profile-img {

            object-fit: cover;

            border: 4px solid #e2e8f0;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #1a202c;
        }
        .role {
            color: #718096;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 24px;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }
        .info-item {
            margin-bottom: 10px;
            font-size: 14px;
            color: #4a5568;
        }
        .info-label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: #2d3748;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #a0aec0;
        }

</head>

    <div class="card">
